<link rel="stylesheet" href="style.css">




<header>
    <h1>🔥 FitQuest Game2</h1>
</header>

<div class="stats-container">
    <div class="stat-card">
        <p>Nivel2</p>
        <h2 id="level">1</h2>
    </div>
    <div class="stat-card">
        <p>Racha 🔥</p>
        <h2 id="streak">0 días</h2>
    </div>
    <div class="stat-card">
        <p>XP</p>
        <h2 id="xp">0</h2>
    </div>
</div>

<div class="main-card">
    <h3 id="exercise-name">Ejercicio: 10 Sentadillas Suaves</h3>
    <p id="motivation-quote">"El primer paso es el más importante."</p>
    
    <button class="exercise-btn" id="btn-complete">¡Hecho! +10 XP</button>

    <div id="reward-msg" class="unlocked">
        <p>¡NUEVO JUEGO DESBLOQUEADO! 🎮</p>
    </div>

    <div class="diet-tip">
        <strong>Tip de Dieta:</strong> <span id="diet-text">Bebe un vaso de agua antes de empezar.</span>
    </div>
</div>
